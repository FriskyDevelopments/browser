name: doppler-build

# Builds compiled userscripts by injecting secrets from Doppler, then uploads
# the dist/ artefacts.  Runs on every push to main (and copilot/* dev branches)
# and on pull requests targeting main.
#
# Prerequisites (repository secrets / variables):
#   DOPPLER_SERVICE_TOKEN   — a Doppler service token scoped to the "nebulosa"
#                             project.  Create one at:
#                             https://dashboard.doppler.com/workplace/projects/nebulosa/configs
#
# When DOPPLER_SERVICE_TOKEN is absent (e.g. fork PRs or branches without the
# secret configured) the workflow exits cleanly without building artefacts.

on:
  push:
    branches:
      - main
      - 'copilot/**'
    paths:
      - 'scripts/**'
      - 'selectors/**'
      - 'config/**'
      - 'package.json'
      - 'doppler.yaml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'selectors/**'
      - 'config/**'
      - 'package.json'
      - 'doppler.yaml'
  workflow_dispatch:

jobs:
  build-userscripts:
    name: Build compiled userscripts via Doppler
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MASTERKEYGITHUB }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Detect whether the Doppler service token is available without
      # referencing secrets context in an `if:` expression (which can cause
      # GitHub Actions validation failures).  The token is exposed only via an
      # env var so it is never printed in plain text.
      - name: Check Doppler service token availability
        id: doppler-check
        env:
          DOPPLER_SERVICE_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        run: |
          if [ -n "$DOPPLER_SERVICE_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOPPLER_SERVICE_TOKEN is not set — skipping Doppler build (expected for forks or branches without the secret)."
          fi

      # Install the Doppler CLI only when the token is present so the step
      # does not fail for runs where the secret is unavailable.
      - name: Install Doppler CLI
        if: steps.doppler-check.outputs.available == 'true'
        uses: dopplerhq/cli-action@v3

      - name: Build userscripts with Doppler secrets
        if: steps.doppler-check.outputs.available == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        run: doppler run --token "$DOPPLER_TOKEN" -- npm run build

      - name: Upload compiled userscripts
        if: steps.doppler-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: compiled-userscripts
          path: dist/
          retention-days: 30
